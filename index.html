*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;display:flex;flex-direction:column}

/* ── HEADER ──────────────────────────────────────────── */
#header{width:100%;height:38vw;min-height:220px;max-height:340px;position:relative;overflow:hidden;flex-shrink:0}
#headerImg{width:100%;height:100%;object-fit:cover;display:block}

/* ── LANG BAR ──────────────────────────────────────────── */
.lang-bar{position:absolute;top:14px;right:14px;z-index:10;display:flex;gap:6px}
.lang-btn{background:rgba(255,255,255,.88);border:none;border-radius:18px;padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:#333;text-transform:uppercase;letter-spacing:.04em}
.lang-btn:hover{background:#fff;transform:translateY(-1px)}
.lang-btn.active{background:#000;color:#fff}

/* ── BANNER ──────────────────────────────────────────── */
#welcomeBanner{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%);color:#fff;padding:14px 18px;font-size:13.5px;line-height:1.5;text-align:center;border-bottom:1px solid rgba(255,255,255,.15);flex-shrink:0}
#welcomeBanner[data-confirmed="1"]{background:linear-gradient(135deg,#059669 0%,#10b981 100%)}
.alert-link{color:#fbbf24;text-decoration:underline;cursor:pointer;font-weight:600}

/* ── POPUP ──────────────────────────────────────────── */
#alertOverlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
}
#alertOverlay.open{
  display:flex;
}
.alert-box{
  background:white;border-radius:1.4rem;
  padding:1.6rem 1.4rem;
  max-width:400px;width:100%;
  box-shadow:0 8px 40px rgba(0,0,0,0.25);
}
.alert-box h3{
  font-size:1.05rem;font-weight:600;
  text-align:center;margin-bottom:1rem;
}
.alert-row{
  display:flex;gap:0.65rem;
  padding:0.85rem 0.95rem;
  border-radius:0.9rem;
  margin-bottom:0.65rem;
}
.alert-row.sand{background:#fff5f5;}
.alert-row.energy{background:#fffbf0;margin-bottom:1.1rem;}
.alert-row .ico{font-size:1.3rem;flex-shrink:0;}
.alert-row p{font-size:0.85rem;line-height:1.5;color:#333;}
.alert-row p strong{display:block;margin-bottom:0.15rem;color:#1a1a1a;}
#alertCloseBtn{
  width:100%;
  background:#1e40af;
  color:#fff;
  border:none;
  border-radius:0.9rem;
  padding:0.75rem;
  font-size:0.95rem;
  font-weight:600;
  cursor:pointer;
  transition:background 0.2s;
}
#alertCloseBtn:hover{background:#1e3a8a;}

/* ── CHAT AREA ──────────────────────────────────────────── */
#chatArea{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff}
#conversation{flex:1;overflow-y:auto;padding:16px 14px;-webkit-overflow-scrolling:touch}
.msg{margin-bottom:12px;display:flex;gap:9px}
.msg.bot{flex-direction:row}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#fff}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#3b82f6,#1e40af)}
.msg.user .msg-avatar{background:linear-gradient(135deg,#10b981,#059669)}
.msg-bubble{max-width:78%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg.bot .msg-bubble{background:#f0f0f0;color:#1a1a1a;border-bottom-left-radius:4px}
.msg.user .msg-bubble{background:#1e40af;color:#fff;border-bottom-right-radius:4px}
.msg-bubble a{color:#3b82f6;text-decoration:underline}
.msg.user .msg-bubble a{color:#fbbf24}

/* ── INPUT BAR ──────────────────────────────────────────── */
#inputBar{border-top:1px solid #e5e5e5;background:#fff;flex-shrink:0}
.inner{display:flex;gap:8px;padding:10px 12px}
#msgInput{flex:1;border:1px solid #d1d5db;border-radius:20px;padding:8px 14px;font-size:14px;font-family:inherit;outline:none;resize:none;max-height:80px}
#msgInput:focus{border-color:#3b82f6}
#sendBtn{background:#1e40af;color:#fff;border:none;border-radius:50%;width:38px;height:38px;flex-shrink:0;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
#sendBtn:hover{background:#1e3a8a}
#sendBtn:disabled{background:#d1d5db;cursor:not-allowed}
</style>

    alertTitle: "⚠️ Two important things",
    t1: "SAND", b1: "Please rinse your feet at the outdoor shower before using indoor bathrooms. Sand can block the drains and cause problems during your stay.",
    t2: "ENERGY", b2: "To avoid power cuts, please do not use too many appliances at the same time (oven, air conditioning, washing machine, water boiler).",
    closeBtn: "Got it ✓"
  }
};

let currentLang = 'it';
let bannerConfirmed = false;

function setLang(lang) {
  currentLang = lang;
  const t = T[lang];

  // bottoni
  document.getElementById('btnIT').className = 'lang-btn' + (lang==='it'?' active':'');
  document.getElementById('btnEN').className = 'lang-btn' + (lang==='en'?' active':'');

  // banner
  if (!bannerConfirmed) {
    const b = document.getElementById('welcomeBanner');
    b.innerHTML = t.bannerText +
      '<br><span class="alert-link" onclick="openAlert()">' + t.alertLink + '</span>';
  }

  // placeholder
  document.getElementById('msgInput').placeholder = t.placeholder;
}

function openAlert() {
  const t = T[currentLang];
  document.getElementById('alertTitle').textContent = t.alertTitle;
  document.getElementById('alertT1').textContent = t.t1;
  document.getElementById('alertB1').textContent = t.b1;
  document.getElementById('alertT2').textContent = t.t2;
  document.getElementById('alertB2').textContent = t.b2;
  document.getElementById('alertCloseBtn').textContent = t.closeBtn;
  document.getElementById('alertOverlay').classList.add('open');
}

function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('open');
  bannerConfirmed = true;
  document.getElementById('welcomeBanner').innerHTML = T[currentLang].afterAlert;
  document.getElementById('welcomeBanner').dataset.confirmed = '1';
}

// ── CHAT ────────────────────────────────────────────
const conversationHistory = [];

function addBotMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `
    <div class="msg-avatar">F</div>
    <div class="msg-bubble">${text}</div>
  `;
  document.getElementById('conversation').appendChild(d);
  scrollToBottom();
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `
    <div class="msg-bubble">${text}</div>
    <div class="msg-avatar">Tu</div>
  `;
  document.getElementById('conversation').appendChild(d);
  scrollToBottom();
}

function scrollToBottom() {
  const c = document.getElementById('conversation');
  c.scrollTop = c.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  addUserMsg(text);
  logMsg('user', text);
  conversationHistory.push({role:'user', content:text});

  input.value = '';
  btn.disabled = true;

  try {
    const systemPrompt = currentLang === 'it' ? SYSTEM_PROMPT_IT : SYSTEM_PROMPT_EN;
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        system: systemPrompt,
        messages: conversationHistory
      })
    });

    if (!res.ok) throw new Error('Network error');

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Errore nella risposta';

    addBotMsg(reply);
    logMsg('assistant', reply);
    conversationHistory.push({role:'assistant', content:reply});

  } catch (err) {
    addBotMsg('❌ Errore di connessione. Riprova tra poco.');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

// ── INPUT HANDLING ────────────────────────────────────────────
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

// ── INIT ────────────────────────────────────────────
setLang('it');
